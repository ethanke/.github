name: "Reusable: Deploy Vite"

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "20"
      app-name:
        description: "Remote directory name under /home/<user>/"
        type: string
        required: true
      env-file:
        description: ".env content with VITE_* vars (baked into bundle at build time)"
        type: string
        required: true
    secrets:
      SSH_PRIVATE_KEY:
        required: true
      CPANEL_HOST:
        required: true
      CPANEL_USERNAME:
        required: true
      SSH_PORT:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - run: npm ci --include=dev

      - name: Create .env (VITE_* vars baked into dist/ at build time)
        run: printf '%s\n' "$ENV_FILE" > .env
        env:
          ENV_FILE: ${{ inputs.env-file }}

      - run: npm run build

      - name: Verify dist/
        run: |
          if [ ! -f dist/index.html ]; then
            echo "::error::dist/index.html not found — Vite build failed"
            exit 1
          fi
          echo "dist/ contents:"
          ls -lah dist/
          echo "Bundle size: $(du -sh dist/ | cut -f1)"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.CPANEL_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync & deploy
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }}"
          TARGET="${{ secrets.CPANEL_USERNAME }}@${{ secrets.CPANEL_HOST }}"
          REMOTE="/home/${{ secrets.CPANEL_USERNAME }}/${{ inputs.app-name }}"

          $SSH $TARGET "mkdir -p ${REMOTE}"

          rsync -azv --delete -e "$SSH" \
            --exclude='.htaccess' \
            dist/ ${TARGET}:${REMOTE}/

          # Deploy .htaccess for SPA routing (all routes → index.html)
          $SSH $TARGET "cat > ${REMOTE}/.htaccess << 'HTEOF'
RewriteEngine On
RewriteBase /
RewriteRule ^index\\.html\$ - [L]
RewriteCond %{REQUEST_FILENAME} !-f
RewriteCond %{REQUEST_FILENAME} !-d
RewriteRule . /index.html [L]

# ── Security headers ──
Header set X-Content-Type-Options "nosniff"
Header set X-Frame-Options "SAMEORIGIN"
Header set Referrer-Policy "strict-origin-when-cross-origin"

# ── Cache static assets (1 year, hashed filenames) ──
<FilesMatch \"\\.(js|css|woff2?|png|jpg|svg|ico|webp)$\">
  Header set Cache-Control \"public, max-age=31536000, immutable\"
</FilesMatch>

# ── No cache for index.html (always fresh) ──
<Files \"index.html\">
  Header set Cache-Control \"no-cache, no-store, must-revalidate\"
</Files>
HTEOF"
