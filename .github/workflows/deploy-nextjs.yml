name: "Reusable: Deploy Next.js"

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "20"
      app-name:
        description: "Remote directory name under /home/<user>/"
        type: string
        required: true
      env-file:
        description: ".env content (secrets resolved by caller)"
        type: string
        required: true
    secrets:
      SSH_PRIVATE_KEY:
        required: true
      CPANEL_HOST:
        required: true
      CPANEL_USERNAME:
        required: true
      SSH_PORT:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - run: npm ci --include=dev

      - name: Create .env
        run: printf '%s\n' "$ENV_FILE" > .env
        env:
          ENV_FILE: ${{ inputs.env-file }}

      - run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.CPANEL_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync & restart
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }}"
          TARGET="${{ secrets.CPANEL_USERNAME }}@${{ secrets.CPANEL_HOST }}"
          REMOTE="/home/${{ secrets.CPANEL_USERNAME }}/${{ inputs.app-name }}"

          $SSH $TARGET "mkdir -p ${REMOTE}/tmp"

          rsync -azv -e "$SSH" \
            server.js package.json package-lock.json .env \
            ${TARGET}:${REMOTE}/

          rsync -azv --delete -e "$SSH" \
            --exclude='cache' \
            .next/ ${TARGET}:${REMOTE}/.next/

          [ -d public ] && rsync -azv --delete -e "$SSH" \
            public/ ${TARGET}:${REMOTE}/public/

          $SSH $TARGET "cd ${REMOTE} && npm install --production 2>&1 | tail -5 && touch tmp/restart.txt"
